<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GaMonix | Oficial</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { padding: 40px 20px; width: 100%; max-width: 400px; }
        .logo { color: #ffd700; font-size: 38px; font-weight: bold; margin-bottom: 5px; letter-spacing: 2px; }
        .tagline { color: #555; font-size: 12px; text-transform: uppercase; margin-bottom: 40px; }
        .link-btn { background: #111; border: 1px solid #333; padding: 22px; border-radius: 15px; margin-bottom: 18px; display: block; text-decoration: none; transition: 0.3s; position: relative; }
        .link-btn:hover { border-color: #ffd700; transform: scale(1.02); }
        .link-btn h3 { margin: 0; color: #fff; font-size: 18px; }
        .link-btn p { margin: 8px 0 0; color: #666; font-size: 12px; }
        .badge { position: absolute; top: 12px; right: 12px; background: #ffd700; color: #000; font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
        .footer { margin-top: 50px; color: #222; font-size: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">GAMONIX</div>
        <div class="tagline">Ecossistema Digital • 2026</div>

        <a href="https://penaltypay.com.br" class="link-btn">
            <span class="badge">JOGAR</span>
            <h3>PenaltyPay</h3>
            <p>Marque gols e ganhe recompensas LTC</p>
        </a>

        <a href="https://f9m9gv.csb.app/" class="link-btn">
            <span class="badge" style="background:#2ecc71">BUSINESS</span>
            <h3>Portal de Banners</h3>
            <p>Anuncie por R$ 20,00 mensais</p>
        </a>

        <div class="link-btn" style="opacity: 0.3;">
            <span class="badge" style="background:#444">BREVE</span>
            <h3>SnakePix</h3>
            <p>O clássico com pagamentos via Pix</p>
        </div>

        <div class="footer">© 2026 GaMonix Group</div>
    </div>
</body>
</html>
